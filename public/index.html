<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="System Repository Management Interface">
  <title>System Repository</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <main class="card">
      <h1 class="title">System Repository</h1>
      
      <div class="state-indicator" id="stateIndicator">
        <div class="state-badge">
          <span class="state-dot"></span>
          <span class="state-text">IDLE</span>
        </div>
      </div>
      
      <button class="trigger-btn" id="triggerBtn" type="button">
        Run System Cycle
      </button>
      
      <div class="status-message" id="statusMessage"></div>
    </main>
  </div>
  
  <script src="js/app.js"></script>
</body>
</html>
